<!DOCTYPE html>

<html>

<head>

  <title>Citizenship - Republic of Southcliff</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background: #ffffff;

      color: #0b0c0c;

    }

    header {

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 16px 22px;

      border-bottom: 4px solid #0C4491;

    }

    .logo img,

    .flag img {

      height: 90px;

      width: auto;

    }

    .title {

      font-size: 36px;

      font-weight: 900;

      color: #0C4491;

      text-align: center;

      flex: 1;

    }

    nav {

      padding: 12px 22px;

      border-bottom: 1px solid #e0e0e0;

    }

    nav a {

      margin-right: 16px;

      color: #0C4491;

      text-decoration: none;

      font-weight: 600;

    }

    nav a:hover {

      color: #EBAF24;

    }

    main {

      max-width: 900px;

      margin: 40px auto;

      padding: 0 20px;

    }

    .card {

      background: #f3f2f1;

      border-left: 4px solid #EBAF24;

      padding: 20px;

      margin-top: 20px;

    }

    label {

      display: block;

      margin-top: 12px;

      font-weight: bold;

      color: #0C4491;

    }

    input, textarea {

      width: 100%;

      padding: 10px;

      margin-top: 6px;

      border: 1px solid #ccc;

      border-radius: 6px;

      font-family: Arial, sans-serif;

    }

    button {

      margin-top: 15px;

      padding: 10px 14px;

      background: #0C4491;

      color: white;

      border: none;

      border-radius: 6px;

      cursor: pointer;

      font-weight: bold;

    }

    button:hover {

      background: #EBAF24;

      color: #0b0c0c;

    }

    .note {

      font-size: 13px;

      color: #555;

      margin-top: 10px;

    }

    footer {

      margin-top: 60px;

      padding: 20px;

      border-top: 1px solid #e0e0e0;

      text-align: center;

      font-size: 13px;

      color: #0C4491;

    }

  </style>

</head>

<body>

<header>

  <div class="logo">

    <a href="index.html">

      <img src="coat-of-arms.png" alt="Coat of Arms">

    </a>

  </div>

  <div class="title">Citizenship Application</div>

  <div class="flag">

    <img src="flag.png" alt="Flag of Southcliff">

  </div>

</header>

<nav>

  <a href="index.html">Home</a>

  <a href="government.html">Government</a>

  <a href="constitution.html">Constitution</a>

  <a href="announcements.html">Announcements</a>

  <a href="anthem.html">National Anthem</a>

</nav>

<main>

<h1>Apply for Citizenship</h1>

<div class="card">

  <form action="https://formspree.io/f/xvznbzky" method="POST">

    <label>Full Name</label>

    <input type="text" name="name" required>

    <label>Email</label>

    <input type="email" name="email" required>

    <label>Why do you want to become a Southcliffian?</label>

    <textarea name="reason" rows="4" required></textarea>

    <label>Upload Photo for Digital Passport</label>

    <input type="file" name="passport_photo" accept="image/*">

    <div class="note">

      This photo may be used to generate your Southcliff digital passport if your application is approved.

    </div>

    <button type="submit">Submit Application</button>

  </form>

</div>

</main>

<footer>

  © Republic of Southcliff. All rights reserved.

</footer>

</body>

</html>
