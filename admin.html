<!DOCTYPE html>

<html>

<head>

  <title>Southcliff Admin Panel</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      margin: 0;

      background: #ffffff;

      color: #0b0c0c;

    }

    header {

      padding: 16px;

      background: #0C4491;

      color: white;

      text-align: center;

      font-size: 22px;

      font-weight: bold;

    }

    main {

      max-width: 700px;

      margin: 40px auto;

      padding: 0 20px;

    }

    label {

      display: block;

      margin-top: 15px;

      font-weight: bold;

      color: #0C4491;

    }

    input, textarea {

      width: 100%;

      padding: 10px;

      margin-top: 5px;

      border: 1px solid #ccc;

      border-radius: 4px;

      box-sizing: border-box;

    }

    textarea {

      height: 140px;

    }

    button {

      margin-top: 20px;

      padding: 12px 20px;

      background: #0C4491;

      color: white;

      border: none;

      border-radius: 4px;

      cursor: pointer;

    }

    button:hover {

      background: #08326d;

    }

    .note {

      margin-top: 20px;

      font-size: 13px;

      color: #666;

    }

  </style>

</head>

<body>

<header>

  Southcliff Government Admin Panel

</header>

<main>

  <label>Announcement Title</label>

  <input type="text" id="title">

  <label>Date</label>

  <input type="date" id="date">

  <label>Announcement Body</label>

  <textarea id="body"></textarea>

  <button onclick="postAnnouncement()">Post Announcement</button>

  <div class="note">

    This posts directly to the Southcliff Firebase database.

  </div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

  const firebaseConfig = {

    databaseURL: "https://southcliff-3352b-default-rtdb.europe-west1.firebasedatabase.app/"

  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  function postAnnouncement() {

    const title = document.getElementById("title").value;

    const date = document.getElementById("date").value;

    const body = document.getElementById("body").value;

    if (!title || !date || !body) {

      alert("Fill in all fields.");

      return;

    }

    const ref = db.ref("announcements").push();

    ref.set({

      title: title,

      date: date,

      body: body

    });

    alert("Announcement posted.");

    document.getElementById("title").value = "";

    document.getElementById("date").value = "";

    document.getElementById("body").value = "";

  }

</script>

</body>

</html>
