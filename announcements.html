<!DOCTYPE html>

<html>

<head>

  <title>Official Announcements - Republic of Southcliff</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background: #ffffff;

      color: #0b0c0c;

      line-height: 1.6;

    }

    header {

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 16px 22px;

      border-bottom: 4px solid #0C4491;

    }

    .logo img {

      height: 80px;

    }

    .title {

      font-size: 28px;

      font-weight: bold;

      color: #0C4491;

      flex: 1;

      text-align: center;

    }

    .flag img {

      height: 100px;

      border: 2px solid #EBAF24;

      padding: 2px;

      border-radius: 4px;

    }

    main {

      max-width: 800px;

      margin: 40px auto;

      padding: 0 20px;

    }

    h1 {

      color: #0C4491;

    }

    .notice {

      border-left: 4px solid #0C4491;

      background: #f3f2f1;

      padding: 15px;

      margin-bottom: 20px;

    }

    .date {

      font-size: 12px;

      color: #666;

      margin-bottom: 5px;

    }

    .title2 {

      font-weight: bold;

      color: #0C4491;

      margin-bottom: 5px;

    }

  </style>

</head>

<body>

<header>

  <div class="logo">

    <a href="index.html">

      <img src="coat-of-arms.png">

    </a>

  </div>

  <div class="title">Republic of Southcliff</div>

  <div class="flag">

    <img src="flag.png">

  </div>

</header>

<main>

<h1>Official Announcements</h1>

<div id="announcements"></div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

  const firebaseConfig = {

    databaseURL: "https://southcliff-3352b-default-rtdb.europe-west1.firebasedatabase.app/"

  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  const container = document.getElementById("announcements");

  db.ref("announcements").on("value", (snapshot) => {

    container.innerHTML = "";

    const data = snapshot.val();

    if (!data) {

      container.innerHTML = "<p>No announcements yet.</p>";

      return;

    }

    const entries = Object.values(data).reverse();

    entries.forEach(item => {

      const div = document.createElement("div");

      div.className = "notice";

      div.innerHTML = `

        <div class="date">${item.date}</div>

        <div class="title2">${item.title}</div>

        <div>${item.body}</div>

      `;

      container.appendChild(div);

    });

  });

</script>

</body>

</html>
